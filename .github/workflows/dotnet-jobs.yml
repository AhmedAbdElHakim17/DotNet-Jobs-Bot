name: .NET Jobs Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run .NET Jobs Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_RSS_URLS: ${{ secrets.LINKEDIN_RSS_URLS }}
          BOT_CI_FAST: "1"
        run: python main.py

      - name: Save seen jobs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update seen_jobs [skip ci]"
            ok=0
            for attempt in 1 2 3 4 5; do
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase --abort 2>/dev/null || true
              git merge --abort 2>/dev/null || true

              if git pull --rebase --no-edit origin "${GITHUB_REF_NAME}"; then
                if git push origin "${GITHUB_REF_NAME}"; then
                  ok=1
                  break
                fi
              else
                if [ -f seen_jobs.json ] && grep -q '<<<<<<<' seen_jobs.json; then
                  python merge_seen_jobs.py
                  git add seen_jobs.json
                  if GIT_EDITOR=true git rebase --continue; then
                    if git push origin "${GITHUB_REF_NAME}"; then
                      ok=1
                      break
                    fi
                  fi
                fi
                git rebase --abort 2>/dev/null || true
              fi
              sleep "$attempt"
            done
            test "$ok" -eq 1
          fi
